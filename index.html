<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Shop</title>

<style>
body{
font-family: Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#333;
color:white;
text-align:center;
padding:15px;
font-size:28px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.product{
background:white;
border-radius:10px;
width:250px;
margin:15px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
padding:10px;
}

.product img{
width:100%;
border-radius:10px;
}

button{
background:#28a745;
color:white;
border:none;
padding:10px 20px;
margin-top:10px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#218838;
}

.order-form{
background:white;
max-width:400px;
margin:30px auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin:10px 0;
}
</style>
</head>

<body>

<header>
My Website Store
</header>

<div class="container">

<div class="product">
<img src="https://via.placeholder.com/250">
<h3>Product 1</h3>
<p>$10</p>
<button onclick="orderProduct('Product 1')">Order</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/250">
<h3>Product 2</h3>
<p>$20</p>
<button onclick="orderProduct('Product 2')">Order</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/250">
<h3>Product 3</h3>
<p>$30</p>
<button onclick="orderProduct('Product 3')">Order</button>
</div>

</div>

<div class="order-form">
<h2>Place Order</h2>

<input type="text" id="name" placeholder="Your Name">

<input type="text" id="address" placeholder="Address">

<input type="text" id="product" placeholder="Product" readonly>

<button onclick="submitOrder()">Submit Order</button>

<p id="message"></p>

</div>

<script>

function orderProduct(productName){
document.getElementById("product").value = productName;
window.scrollTo(0, document.body.scrollHeight);
}

function submitOrder(){

let name = document.getElementById("name").value;
let address = document.getElementById("address").value;
let product = document.getElementById("product").value;

if(name=="" || address=="" || product==""){
document.getElementById("message").innerHTML="Please fill all fields";
return;
}

document.getElementById("message").innerHTML="Order placed successfully!";

}

</script>

</body>
</html>
